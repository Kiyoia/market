clickhouse:
  host: ""
  port: 9000
  database: ""
  user: ""
  password: ""

data_dir: "./data"
base_date: "2025-05-17"

anomaly_params:
  std_threshold: 3
  price_high_ratio: 5
  price_low_ratio: 0.2
  historical_window: 30
  min_category_count: 10

log:
  level: "INFO"
  format: "%(asctime)s - %(levelname)s - %(message)s"

server:
  host: "127.0.0.1"
  port: 8000

safety:
  db_write_enabled: false
  schema_reset_enabled: false
